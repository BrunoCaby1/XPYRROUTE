<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>X-Pyr Route — Interactive Map</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  :root{
    --ink:#101614;
    --panel:#141b19;
    --panel-2:#1b2422;
    --line:#2a3532;
    --paper:#eef1ea;
    --paper-dim:#9fb0aa;
    --hike:#22c55e;
    --flight:#3355ff;
    --task:#ef4444;
    --accent:#f2a341;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    height:100vh; height:100dvh;
    background:var(--ink); color:var(--paper);
    font-family:var(--sans);
    overflow:hidden;
  }
  #app{
    display:grid;
    grid-template-rows:auto 1fr auto;
    height:100vh; height:100dvh;
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px;
    padding-top: calc(10px + env(safe-area-inset-top, 0px));
    background:var(--panel);
    border-bottom:1px solid var(--line);
    z-index:20;
  }
  header .title{
    display:flex; align-items:baseline; gap:10px;
  }
  header h1{
    font-size:15px; letter-spacing:.06em; text-transform:uppercase;
    font-weight:700; margin:0; color:var(--paper);
  }
  header .subtitle{
    font-size:12px; color:var(--paper-dim); font-family:var(--mono);
  }
  header .legend{
    display:flex; gap:16px; font-size:11px; color:var(--paper-dim); font-family:var(--mono);
  }
  header .legend span{display:flex; align-items:center; gap:6px;}
  header .legend i{width:14px; height:3px; display:inline-block; border-radius:2px;}
  .task-swatch{
    width:14px; height:0; border-top:2px dashed var(--task); display:inline-block;
  }
  .btn-reset{
    background:var(--panel-2); color:var(--paper); border:1px solid var(--line);
    padding:6px 12px; border-radius:6px; font-family:var(--mono); font-size:11px;
    cursor:pointer; letter-spacing:.03em;
  }
  .btn-reset:hover{border-color:var(--accent); color:var(--accent);}
  .menu-toggle{
    display:none;
    background:var(--panel-2); color:var(--paper); border:1px solid var(--line);
    border-radius:6px; width:34px; height:34px; font-size:16px;
    cursor:pointer; align-items:center; justify-content:center; flex:none;
  }
  #sidebarBackdrop{
    display:none;
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:999;
  }
  .footer-collapse{
    display:none;
    position:absolute; top:-1px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); color:var(--paper-dim); border:1px solid var(--line); border-bottom:none;
    border-radius:6px 6px 0 0; width:44px; height:18px; font-size:11px;
    align-items:center; justify-content:center; cursor:pointer; z-index:25;
  }
  .footer-resizer{
    display:none;
    position:absolute; top:-11px; left:0; right:0; height:22px;
    cursor:row-resize; touch-action:none; z-index:24;
    align-items:center; justify-content:center;
  }
  .footer-resizer::before{
    content:''; width:36px; height:4px; border-radius:2px;
    background:var(--line);
  }
  .footer-resizer:active::before{ background:var(--accent); }

  /* ---------- MAIN ---------- */
  main{
    display:grid;
    grid-template-columns: 260px 1fr;
    min-height:0;
    position:relative;
  }
  #map{ width:100%; height:100%; background:#0c1110; }

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    background:var(--panel);
    border-right:1px solid var(--line);
    overflow-y:auto;
    padding:10px 0 20px;
  }
  #sidebar::-webkit-scrollbar{ width:6px; }
  #sidebar::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  .day-group{ margin-bottom:4px; }
  .day-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; cursor:pointer;
    font-family:var(--mono); font-size:11px; letter-spacing:.05em;
    color:var(--paper-dim); text-transform:uppercase;
    border-top:1px solid var(--line);
  }
  .day-head:hover{ color:var(--paper); }
  .day-head .d-dist{ color:var(--accent); }

  .seg-btn{
    display:flex; align-items:center; gap:8px;
    width:100%; text-align:left;
    padding:6px 14px 6px 22px;
    background:none; border:none; color:var(--paper);
    font-family:var(--sans); font-size:12px;
    cursor:pointer;
    border-left:3px solid transparent;
  }
  .seg-btn .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .seg-btn .lbl{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--paper-dim); }
  .seg-btn .km{ font-family:var(--mono); font-size:10px; color:var(--paper-dim); }
  .seg-btn:hover{ background:var(--panel-2); }
  .seg-btn.active{ background:var(--panel-2); border-left-color:var(--accent); }
  .seg-btn.active .lbl{ color:var(--paper); }

  /* ---------- FOOTER / ELEVATION ---------- */
  footer{
    background:var(--panel);
    border-top:1px solid var(--line);
    display:grid;
    grid-template-columns: 320px 1fr;
    height:210px;
    z-index:20;
    min-height:0;
    position:relative;
    transition: height .2s ease;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #stats{
    padding:12px 16px;
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    gap:8px;
    min-height:0;
    overflow:hidden;
  }
  #stats .name{
    font-size:12px; color:var(--paper); font-weight:700; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    flex:none;
  }
  .stat-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap:8px;
    flex:1;
    min-height:0;
  }
  .stat-tile{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:6px;
    padding:7px 8px;
    display:flex; flex-direction:column; justify-content:center;
    gap:2px;
    min-width:0;
  }
  .stat-tile .k{
    font-family:var(--mono); font-size:9px; letter-spacing:.03em;
    text-transform:uppercase; color:var(--paper-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .stat-tile .v{
    font-family:var(--mono); font-size:13px; color:var(--accent); font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #chartWrap{ position:relative; padding:10px 16px 6px; min-width:0; overflow:hidden; }
  #chartWrap canvas{ width:100% !important; height:100% !important; }
  .chart-toolbar{
    position:absolute; top:6px; right:16px; z-index:5;
    display:flex; align-items:center; gap:6px;
  }
  .chart-toolbar-label{
    font-family:var(--mono); font-size:9.5px; color:var(--paper-dim);
    text-transform:uppercase; letter-spacing:.03em;
  }
  .unit-btn{
    font-family:var(--mono); font-size:10px;
    background:var(--panel-2); color:var(--paper-dim);
    border:1px solid var(--line); border-radius:4px;
    padding:2px 8px; cursor:pointer;
  }
  .unit-btn.active{ background:#4fb3d9; color:#0c1110; border-color:#4fb3d9; font-weight:700; }
  .unit-btn:hover:not(.active){ border-color:#4fb3d9; color:#4fb3d9; }

  /* leaflet tweaks */
  .leaflet-control-attribution{ font-size:9px; }
  .leaflet-popup-content-wrapper{ background:var(--panel); color:var(--paper); font-family:var(--mono); font-size:11px; }
  .leaflet-popup-tip{ background:var(--panel); }
  .marker-hover{
    width:10px; height:10px; border-radius:50%;
    background:var(--accent); border:2px solid #fff;
    box-shadow:0 0 6px rgba(0,0,0,.5);
  }
  .camp-label{
    background:var(--panel); color:var(--paper);
    border:1px solid var(--line);
    font-family:var(--mono); font-size:10.5px; font-weight:600;
    padding:2px 6px; border-radius:4px;
    box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .camp-label::before{ display:none; }

  footer.collapsed{
    height: calc(22px + env(safe-area-inset-bottom, 0px)) !important;
    border-top-color:var(--line);
  }
  footer.collapsed #stats,
  footer.collapsed #chartWrap{ display:none; }
  footer.collapsed .footer-collapse{ transform:translateX(-50%) rotate(180deg); }

  .media-marker{
    width:26px; height:26px; border-radius:50%;
    background:#8b5cf6; border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; box-shadow:0 1px 4px rgba(0,0,0,.5);
    cursor:pointer;
  }
  .play-marker{
    width:16px; height:16px; border-radius:50%;
    border:3px solid #fff; box-shadow:0 0 0 3px rgba(0,0,0,.35), 0 1px 6px rgba(0,0,0,.6);
  }

  /* ---------- PLAYBACK BAR ---------- */
  #playbackBar{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
    z-index:1200;
    display:flex; align-items:center; gap:10px;
    background:rgba(20,27,25,.92);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 14px;
    width:min(560px, 90%);
    box-shadow:0 4px 18px rgba(0,0,0,.45);
    backdrop-filter: blur(4px);
  }
  #playBtn{
    flex:none; width:32px; height:32px; border-radius:50%;
    background:var(--accent); color:#1a1200; border:none;
    font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #playElapsed, #playTotal{
    font-family:var(--mono); font-size:10.5px; color:var(--paper-dim); flex:none;
  }
  #playSlider{
    flex:1; min-width:0; accent-color:var(--accent);
    height:4px; cursor:pointer;
    position:relative; z-index:2;
  }
  .slider-wrap{
    position:relative; flex:1; min-width:0;
    display:flex; align-items:center;
  }
  .day-ticks{
    position:absolute; left:6px; right:6px; top:50%;
    transform:translateY(-50%);
    height:14px; pointer-events:none; z-index:1;
  }
  .day-tick{
    position:absolute; top:0; width:1px; height:14px;
    background:rgba(159,176,170,.6);
  }
  .day-tick span{
    position:absolute; top:-11px; left:50%; transform:translateX(-50%);
    font-size:8px; color:var(--paper-dim); font-family:var(--mono);
    white-space:nowrap;
  }
  .speed-group{ display:flex; gap:4px; flex:none; }
  .speed-btn{
    font-family:var(--mono); font-size:10px;
    background:var(--panel-2); color:var(--paper-dim);
    border:1px solid var(--line); border-radius:4px;
    padding:3px 6px; cursor:pointer;
  }
  .speed-btn.active{ background:var(--accent); color:#1a1200; border-color:var(--accent); font-weight:700; }
  .speed-btn:hover:not(.active){ border-color:var(--accent); color:var(--accent); }

  /* ---------- LIGHTBOX ---------- */
  #lightbox{
    display:none;
    position:fixed; inset:0; background:rgba(6,8,7,.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index:5000;
    align-items:center; justify-content:center;
    flex-direction:column;
  }
  #lightbox.open{ display:flex; }
  #lbMediaWrap{
    max-width:92vw; max-height:78vh;
    display:flex; align-items:center; justify-content:center;
  }
  #lbMediaWrap img, #lbMediaWrap video{
    max-width:92vw; max-height:78vh;
    border-radius:6px;
    box-shadow:0 4px 24px rgba(0,0,0,.6);
  }
  #lbCaption{
    margin-top:14px; text-align:center;
    color:var(--paper); font-family:var(--mono);
    font-size:13px; max-width:80vw;
  }
  #lbCaption .coords{ color:var(--paper-dim); font-size:11px; margin-top:3px; }
  .lb-error{
    color:var(--paper); font-family:var(--mono); font-size:13px;
    text-align:center; padding:30px; line-height:1.8;
  }
  .lb-error a{ color:var(--accent); }
  #lbClose{
    position:absolute; top:16px; right:18px;
    background:var(--panel-2); color:var(--paper); border:1px solid var(--line);
    width:38px; height:38px; border-radius:50%; font-size:16px; cursor:pointer;
    z-index:10;
  }
  .lb-nav{
    position:absolute; top:50%; transform:translateY(-50%);
    background:var(--panel-2); color:var(--paper); border:1px solid var(--line);
    width:46px; height:46px; border-radius:50%; font-size:24px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:10;
  }
  .lb-nav:hover{ border-color:var(--accent); color:var(--accent); }
  #lbPrev{ left:14px; }
  #lbNext{ right:14px; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 768px){
    header{ padding:6px 10px; gap:6px; flex-wrap:nowrap; }
    header .title{ gap:6px; min-width:0; overflow:hidden; flex:1 1 auto; }
    header h1{ font-size:10.5px; letter-spacing:.03em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    header .subtitle{ display:none; }
    header .legend{ gap:6px; flex:none; }
    header .legend span{ font-size:9px; gap:3px; }
    header .legend span i{ width:9px; height:2.5px; }
    .menu-toggle{ display:flex; width:28px; height:28px; font-size:14px; flex:none; }
    .btn-reset{ padding:5px 7px; font-size:9px; white-space:nowrap; flex:none; }

    main{ display:block; position:relative; overflow:hidden; }
    #map{ position:absolute; inset:0; }

    #sidebar{
      position:fixed; top:0; bottom:0; left:0;
      width:82%; max-width:300px;
      transform:translateX(-100%);
      transition:transform .25s ease;
      z-index:1000;
      box-shadow:2px 0 16px rgba(0,0,0,.6);
      padding-top:54px;
    }
    #sidebar.open{ transform:translateX(0); }
    #sidebarBackdrop.show{ display:block; }

    footer{
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height:33vh;
      height:33dvh;
    }
    .footer-resizer{ display:flex; }
    #stats{ border-right:none; border-bottom:1px solid var(--line); padding:6px 10px; overflow-y:auto; gap:5px; }
    #stats .name{ font-size:10.5px; }
    .stat-grid{ grid-template-columns: repeat(3, 1fr); gap:5px; }
    .stat-tile{ padding:4px 5px; gap:0; }
    .stat-tile .k{ font-size:7.5px; }
    .stat-tile .v{ font-size:11px; }
    #chartWrap{ padding:6px 10px 4px; overflow:auto; min-height:0; }
    .footer-collapse{ display:flex; }
    .chart-toolbar{ top:2px; right:8px; }
    .chart-toolbar-label{ display:none; }

    .day-head, .seg-btn{ padding-top:9px; padding-bottom:9px; }

    #lbClose{ top: calc(12px + env(safe-area-inset-top, 0px)); right:12px; width:36px; height:36px; }
    .lb-nav{ width:42px; height:42px; font-size:22px; }
    #lbPrev{ left:8px; }
    #lbNext{ right:8px; }
    #lbCaption{ font-size:11.5px; padding-bottom: env(safe-area-inset-bottom, 0px); }

    #playbackBar{
      width:94%; padding:6px 10px; gap:6px; bottom:10px;
      flex-wrap:nowrap;
    }
    #playBtn{ width:28px; height:28px; font-size:11px; }
    #playElapsed, #playTotal{ font-size:8.5px; }
    .speed-group{ gap:3px; }
    .speed-btn{ padding:3px 5px; font-size:9px; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="title">
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <h1>X-Pyr Route</h1>
      <span class="subtitle" id="tripSummary">loading…</span>
    </div>
    <div class="legend">
      <span><i style="background:var(--hike)"></i>Hike</span>
      <span><i style="background:var(--flight)"></i>Flight</span>
      <span class="task-legend"><i class="task-swatch"></i>Task</span>
      <span>📷 Media</span>
    </div>
    <button class="btn-reset" id="resetBtn">Full route</button>
  </header>

  <main>
    <div id="sidebarBackdrop"></div>
    <div id="sidebar"></div>
    <div id="map"></div>
    <div id="playbackBar">
      <button id="playBtn" aria-label="Play">▶</button>
      <span id="playElapsed">0:00</span>
      <div class="slider-wrap">
        <input type="range" id="playSlider" min="0" max="100" value="0" step="1">
        <div id="dayTicks" class="day-ticks"></div>
      </div>
      <span id="playTotal">0:00</span>
      <div class="speed-group">
        <button class="speed-btn" data-speed="1">1×</button>
        <button class="speed-btn active" data-speed="50">50×</button>
        <button class="speed-btn" data-speed="100">100×</button>
        <button class="speed-btn" data-speed="200">200×</button>
      </div>
    </div>
  </main>

  <footer id="footerPanel">
    <div class="footer-resizer" id="footerResizer"></div>
    <button class="footer-collapse" id="footerCollapse" aria-label="Toggle elevation panel">▾</button>
    <div id="stats"></div>
    <div id="chartWrap">
      <div class="chart-toolbar">
        <span class="chart-toolbar-label">vertical speed:</span>
        <button class="unit-btn active" data-unit="ms">m/s</button>
        <button class="unit-btn" data-unit="mh">m/h</button>
      </div>
      <canvas id="elevChart"></canvas>
    </div>
  </footer>
</div>

<div id="lightbox">
  <button id="lbClose" aria-label="Close">✕</button>
  <button id="lbPrev" class="lb-nav" aria-label="Previous">‹</button>
  <button id="lbNext" class="lb-nav" aria-label="Next">›</button>
  <div id="lbMediaWrap"></div>
  <div id="lbCaption"></div>
</div>

    const layer = L.polyline(latlngs, {

          html:`<div style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;background:#ef4444;border:2px solid #fff;border-radius:50%;color:#fff;font:700 10px var(--mono, monospace);">${isStart?'S':isEnd?'E':i}</div>`,
          iconSize:[20,20], iconAnchor:[10,10]
        })
      }).bindPopup(`<b>${name}</b><br>${description}<br>alt: ${altSmoothed} m · radius: ${radius/1000} km`)
        .addTo(taskLayer);
    });
  }
  taskLayer.addTo(map);

  // start / camp markers: end of last hike each day
  const dayOrder = [];
  TRACKS.forEach(t => { if (!dayOrder.includes(t.day)) dayOrder.push(t.day); });

  function campIcon(){
    return L.divIcon({
      className:'',
      html:`<div style="font-size:20px; line-height:20px; text-align:center; filter:drop-shadow(0 1px 2px rgba(0,0,0,.7));">⛺</div>`,
      iconSize:[20,20], iconAnchor:[10,16]
    });
  }
  dayOrder.forEach(day => {
    const segs = TRACKS.filter(t => t.day === day);
    const last = segs[segs.length-1];
    const p = last.pts[last.pts.length-1];
    const dayLabel = day.replace('day','Day ');
    L.marker([p[0], p[1]], { icon: campIcon() })
      .addTo(map)
      .bindTooltip(dayLabel, { permanent:true, direction:'right', offset:[6,-8], className:'camp-label' })
      .bindPopup(`<b>${dayLabel} — end</b><br>${last.stats.end_time ? last.stats.end_time.slice(0,16).replace('T',' ') : ''}`);
  });
  // trip start marker
  const startPt = TRACKS[0].pts[0];
  L.marker([startPt[0], startPt[1]], {
    icon: L.divIcon({ className:'', html:'<div style="width:12px;height:12px;background:#22c55e;border:2px solid #fff;border-radius:50%;"></div>', iconSize:[12,12], iconAnchor:[6,6] })
  }).addTo(map).bindPopup('<b>Start</b>');

  // hover marker for elevation-chart sync
  const hoverMarker = L.marker([0,0], {
    icon: L.divIcon({ className:'marker-hover', html:'', iconSize:[10,10], iconAnchor:[5,5] }),
    opacity: 0
  }).addTo(map);

  // ---------- Sidebar ----------
  const sidebar = document.getElementById('sidebar');
  const dayTotals = {};
  TRACKS.forEach(t => { dayTotals[t.day] = (dayTotals[t.day]||0) + t.stats.distance_km; });

  dayOrder.forEach(day => {
    const group = document.createElement('div');
    group.className = 'day-group';
    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `<span>${day.replace('day','Day ')}</span><span class="d-dist">${dayTotals[day].toFixed(1)} km</span>`;
    head.addEventListener('click', () => selectDay(day));

    TRACKS.filter(t => t.day === day).forEach((t) => {
      const idx = TRACKS.indexOf(t);
      const btn = document.createElement('button');
      btn.className = 'seg-btn';
      btn.dataset.idx = idx;
      const label = t.type === 'hiking' ? 'Hike' : 'Flight';
      const igcTag = t.source && t.source.startsWith('igc') ? ' <span style="color:#f2a341;font-size:9px;">IGC</span>' : '';
      btn.innerHTML = `<span class="dot" style="background:${t.type==='hiking' ? '#22c55e' : '#3355ff'}"></span>
                        <span class="lbl">${label} ${t.order}${igcTag}</span>
                        <span class="km">${t.stats.distance_km} km</span>`;

    sidebar.appendChild(group);
  });

  // ---------- Stats + chart ----------
  const statsEl = document.getElementById('stats');
  const ctx = document.getElementById('elevChart').getContext('2d');
  let chart = null;
  let currentIdx = null;

  // playback state (declared early — buildPlaybackTimeline runs during initial showFullRoute())
  const playState = {
    playing: false,
    simTime: 0,
    totalDuration: 0,
    speed: 50,
    segments: [],
    lastFrameTs: null
  };
  let playMarker = null;

  function fmtDuration(sec){
    if (sec == null) return '—';
    const h = Math.floor(sec/3600), m = Math.round((sec%3600)/60);
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }

  function renderStatsPanel(title, segs){
    // segs: array of track objects
    const hikeSegs = segs.filter(t => t.type === 'hiking');
    const flightSegs = segs.filter(t => t.type !== 'hiking');
    const hikeDist = hikeSegs.reduce((s,t)=>s+t.stats.distance_km, 0);
    const flyDist = flightSegs.reduce((s,t)=>s+t.stats.distance_km, 0);
    const hikeAscent = hikeSegs.reduce((s,t)=>s+t.stats.gain_m, 0);
    const hikeDur = hikeSegs.reduce((s,t)=>s+(t.stats.duration_s||0), 0);
    const totalDur = segs.reduce((s,t)=>s+(t.stats.duration_s||0), 0);
    const totalDist = hikeDist + flyDist;
    const speed = totalDur ? (totalDist / (totalDur/3600)) : null;
    const ascentRate = hikeDur ? (hikeAscent / (hikeDur/3600)) : null;

    statsEl.innerHTML = `
      <div class="name">${title}</div>
      <div class="stat-grid">
        <div class="stat-tile"><span class="k">hiking distance</span><span class="v">${hikeDist.toFixed(1)} km</span></div>
        <div class="stat-tile"><span class="k">flying distance</span><span class="v">${flyDist.toFixed(1)} km</span></div>
        <div class="stat-tile"><span class="k">duration</span><span class="v">${fmtDuration(totalDur)}</span></div>
        <div class="stat-tile"><span class="k">hiking ascent</span><span class="v">${hikeSegs.length ? '+'+Math.round(hikeAscent)+' m' : '—'}</span></div>
        <div class="stat-tile"><span class="k">avg ascent rate</span><span class="v">${ascentRate!=null ? '+'+Math.round(ascentRate)+' m/h' : '—'}</span></div>
        <div class="stat-tile"><span class="k">avg speed</span><span class="v">${speed ? speed.toFixed(1)+' km/h' : '—'}</span></div>
      </div>
    `;
  }

  function cumulativeDistances(pts){
    const R = 6371000;
    let d = 0;
    const out = [0];
    for (let i=1;i<pts.length;i++){
      const [lat1,lon1] = pts[i-1];
      const [lat2,lon2] = pts[i];
      const p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
      const dphi=(lat2-lat1)*Math.PI/180, dlmb=(lon2-lon1)*Math.PI/180;
      const a=Math.sin(dphi/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dlmb/2)**2;
      d += 2*R*Math.asin(Math.sqrt(a));
      out.push(d);
    }
    return out.map(v => v/1000);
  }

  function fmtElapsed(sec){
    if (sec == null) return '—';
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.round(sec%60);
    return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  let vSpeedUnit = 'ms'; // 'ms' or 'mh'
  let lastChartTracks = null;

  function renderChartForTracks(tracks, highlightIdx){
    lastChartTracks = tracks;
    buildPlaybackTimeline(tracks);
    // concatenate distance across tracks (for multi-track / day / full view)
    let offset = 0;
    const labels = [];
    const dataPoints = [];
    const vSpeedRaw = []; // always m/s, converted at render time
    const pointMeta = []; // {idx, lat, lon, type, tOffset, vSpeed, hSpeed}

    tracks.forEach(({t, idx}) => {
      const cum = cumulativeDistances(t.pts.map(p=>[p[0],p[1]]));
      t.pts.forEach((p, i) => {
        const distKm = offset + cum[i];
        labels.push(distKm.toFixed(2));
        dataPoints.push(p[2]);

        let vSpeed = null, hSpeed = null;
        const tOff = p[3];
        if (i > 0 && t.pts[i-1][3] != null && tOff != null){
          const dt = tOff - t.pts[i-1][3];
          const dEle = p[2] - t.pts[i-1][2];
          const dDistKm = cum[i] - cum[i-1];
          if (dt > 0){
            vSpeed = dEle / dt; // m/s
            hSpeed = (dDistKm*1000) / dt; // m/s
          }
        }
        vSpeedRaw.push(vSpeed);
        pointMeta.push({ idx, lat:p[0], lon:p[1], type: t.type, tOffset: tOff, vSpeed, hSpeed });
      });
      offset += cum[cum.length-1];
    });

    const unitFactor = vSpeedUnit === 'mh' ? 3600 : 1;
    const unitLabel = vSpeedUnit === 'mh' ? 'm/h' : 'm/s';
    const vSpeedPoints = vSpeedRaw.map(v => v == null ? null : v * unitFactor);

    // push the speed line into the lower portion of the plot area, separated visually from elevation
    const validSpeeds = vSpeedPoints.filter(v => v != null);
    const maxAbs = validSpeeds.length ? Math.max(...validSpeeds.map(Math.abs), 0.01) : 1;
    const y1Min = -maxAbs * 1.15;
    const y1Max = maxAbs * 4;

    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'elevation (m)',
            data: dataPoints,
            borderColor: '#f2a341',
            backgroundColor: 'rgba(242,163,65,0.15)',
            fill: true,
            pointRadius: 0,
            borderWidth: 1.5,
            tension: 0.15,
            yAxisID: 'y',
            order: 2
          },
          {
            label: `vertical speed (${unitLabel})`,
            data: vSpeedPoints,
            borderColor: '#4fb3d9',
            backgroundColor: 'transparent',
            fill: false,
            pointRadius: 0,
            borderWidth: 1,
            tension: 0.1,
            spanGaps: false,
            yAxisID: 'y1',
            order: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: {
            display:true,
            labels: {
              color:'#9fb0aa', boxWidth:12, boxHeight:2,
              font:{ family:'monospace', size:9.5 },
              padding:8
            }
          },
          tooltip: {
            callbacks: {
              title: (items) => `${items[0].label} km`,
              label: (item) => {
                if (item.dataset.yAxisID === 'y1') return `vertical speed: ${item.formattedValue} ${unitLabel}`;
                return `elevation: ${item.formattedValue} m`;
              },
              afterLabel: (item) => {
                if (item.dataset.yAxisID === 'y1') return '';
                const meta = pointMeta[item.dataIndex];
                if (!meta) return '';
                const isHiking = meta.type === 'hiking';
                const lines = [];
                lines.push(`${isHiking ? 'hike' : 'flight'} time: ${fmtElapsed(meta.tOffset)}`);
                if (meta.hSpeed == null){
                  lines.push('horizontal: —');
                } else if (isHiking){
                  if (meta.hSpeed > 0){
                    const paceMinPerKm = (1000/meta.hSpeed) / 60; // min per km
                    const pm = Math.floor(paceMinPerKm);
                    const ps = Math.round((paceMinPerKm - pm)*60);
                    lines.push(`horizontal: ${pm}:${String(ps).padStart(2,'0')} min/km`);
                  } else {
                    lines.push('horizontal: —');
                  }
                } else {
                  lines.push(`horizontal: ${(meta.hSpeed*3.6).toFixed(1)} km/h`);
                }
                return lines;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { color:'#9fb0aa', maxTicksLimit:8, font:{ family:'monospace', size:10 } },
            grid: { color:'#2a3532' },
            title: { display:true, text:'distance (km)', color:'#9fb0aa', font:{ family:'monospace', size:10 } }
          },
          y: {
            position: 'left',
            ticks: { color:'#9fb0aa', font:{ family:'monospace', size:10 } },
            grid: { color:'#2a3532' },
            title: { display:true, text:'elevation (m)', color:'#9fb0aa', font:{ family:'monospace', size:10 } }
          },
          y1: {
            position: 'right',
            min: y1Min,
            max: y1Max,
            ticks: {
              color:'#4fb3d9', font:{ family:'monospace', size:9 },
              maxTicksLimit: 4
            },
            grid: { display:false },
            title: { display:true, text:`vertical speed (${unitLabel})`, color:'#4fb3d9', font:{ family:'monospace', size:10 } }
          }
        },
        onHover: (evt, elements, c) => {
          if (elements && elements.length){
            const meta = pointMeta[elements[0].index];
            hoverMarker.setLatLng([meta.lat, meta.lon]);
            hoverMarker.setOpacity(1);
          } else {
            hoverMarker.setOpacity(0);
          }
        }
      }
    });
  }

  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      vSpeedUnit = btn.dataset.unit;
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b === btn));
      if (lastChartTracks) renderChartForTracks(lastChartTracks);
    });
  });

  function highlightLayers(activeIdxs){
    trackLayers.forEach(({track, layer}, idx) => {
      const active = activeIdxs.includes(idx);
      layer.setStyle({
        opacity: active || activeIdxs.length===0 ? 0.85 : 0.12,
        weight: active ? (track.type==='hiking'?5:4) : (track.type==='hiking'?3:2.5)
      });
      if (active) layer.bringToFront();
    });
  }

  function clearSidebarActive(){
    document.querySelectorAll('.seg-btn.active').forEach(b => b.classList.remove('active'));
  }

  function selectSegment(idx){
    currentIdx = idx;
    clearSidebarActive();
    const btn = document.querySelector(`.seg-btn[data-idx="${idx}"]`);
    if (btn) btn.classList.add('active');

    const t = TRACKS[idx];
    highlightLayers([idx]);
    map.fitBounds(trackLayers[idx].bounds, { padding:[40,40] });

    const label = t.type === 'hiking' ? `Day ${t.day.replace('day','')} · Hike ${t.order}` : `Day ${t.day.replace('day','')} · Flight ${t.order}`;
    const igcNote = t.source && t.source.startsWith('igc') ? ' · IGC-verified altitude' : '';
    renderStatsPanel(label + igcNote, [t]);
    renderChartForTracks([{t, idx}], idx);
  }

  function selectDay(day){
    currentIdx = null;
    clearSidebarActive();
    const segs = [];
    TRACKS.forEach((t, idx) => { if (t.day === day) segs.push({t, idx}); });
    const idxs = segs.map(s => s.idx);
    highlightLayers(idxs);
    const b = L.latLngBounds(idxs.flatMap(i => trackLayers[i].bounds ? [trackLayers[i].bounds.getSouthWest(), trackLayers[i].bounds.getNorthEast()] : []));
    map.fitBounds(b, { padding:[40,40] });

    renderStatsPanel(day.replace('day','Day '), segs.map(s=>s.t));
    renderChartForTracks(segs);
  }

  function showFullRoute(){
    currentIdx = null;
    clearSidebarActive();
    highlightLayers([]);
    map.fitBounds(fullBounds, { padding:[30,30] });

    renderStatsPanel('Full route — 7 days', TRACKS);
    renderChartForTracks(TRACKS.map((t,idx)=>({t,idx})));
  }

  document.getElementById('resetBtn').addEventListener('click', showFullRoute);

  // ---------- Mobile: sidebar drawer ----------
  const sidebarEl = document.getElementById('sidebar');
  const backdropEl = document.getElementById('sidebarBackdrop');
  const menuToggle = document.getElementById('menuToggle');

  function closeSidebar(){
    sidebarEl.classList.remove('open');
    backdropEl.classList.remove('show');
  }
  function openSidebar(){
    sidebarEl.classList.add('open');
    backdropEl.classList.add('show');
  }
  menuToggle.addEventListener('click', () => {
    sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  backdropEl.addEventListener('click', closeSidebar);

  // auto-close drawer after picking a segment/day on mobile
  sidebarEl.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && (e.target.closest('.seg-btn') || e.target.closest('.day-head'))){
      setTimeout(closeSidebar, 150);
    }
  });

  // ---------- Mobile: collapsible elevation panel ----------
  const footerPanel = document.getElementById('footerPanel');
  const footerCollapse = document.getElementById('footerCollapse');
  footerCollapse.addEventListener('click', () => {
    footerPanel.classList.toggle('collapsed');
    setTimeout(() => map.invalidateSize(), 220);
  });

  window.addEventListener('resize', () => map.invalidateSize());

  // ---------- Mobile: draggable resizer between map and elevation panel ----------
  const footerResizer = document.getElementById('footerResizer');
  const appEl = document.getElementById('app');
  let footerFraction = 0.33; // default 33% elevation / 66% map
  let dragging = false;
  let dragStartY = 0;
  let dragStartHeight = 0;

  function availableHeight(){
    const headerH = document.querySelector('header').offsetHeight;
    return appEl.clientHeight - headerH;
  }
  function applyFooterHeight(){
    if (window.innerWidth > 768) return;
    const avail = availableHeight();
    footerPanel.style.height = Math.round(avail * footerFraction) + 'px';
    map.invalidateSize();
  }

  footerResizer.addEventListener('pointerdown', (e) => {
    dragging = true;
    dragStartY = e.clientY;
    dragStartHeight = footerPanel.getBoundingClientRect().height;
    footerPanel.classList.remove('collapsed');
    footerResizer.setPointerCapture(e.pointerId);
  });
  footerResizer.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dy = e.clientY - dragStartY;
    const avail = availableHeight();
    let newHeight = dragStartHeight - dy; // drag up = taller panel, drag down = shorter panel
    const minH = avail * 0.12;
    const maxH = avail * 0.85;
    newHeight = Math.max(minH, Math.min(maxH, newHeight));
    footerFraction = newHeight / avail;
    footerPanel.style.height = Math.round(newHeight) + 'px';
    map.invalidateSize();
  });
  const endDrag = () => { dragging = false; };
  footerResizer.addEventListener('pointerup', endDrag);
  footerResizer.addEventListener('pointercancel', endDrag);

  if (window.innerWidth <= 768){
    applyFooterHeight();
    window.addEventListener('resize', applyFooterHeight);
  }

  // ---------- Photos & videos from a GitHub folder ----------
  const VIDEO_EXT = ['mp4','webm','mov'];
  const IMAGE_EXT = ['jpg','jpeg','png','gif','webp'];
  const FILENAME_RE = /^(-?\d+\.\d+)_(-?\d+\.\d+)_(.+)\.([a-zA-Z0-9]+)$/;

  function parseMediaFilename(name, url){
    const m = name.match(FILENAME_RE);
    if (!m) return null;
    const lat = parseFloat(m[1]);
    const lon = parseFloat(m[2]);
    const label = m[3].replace(/[-_]/g, ' ');
    const ext = m[4].toLowerCase();
    if (isNaN(lat) || isNaN(lon)) return null;
    const isVideo = VIDEO_EXT.includes(ext);
    const isImage = IMAGE_EXT.includes(ext);
    if (!isVideo && !isImage) return null;
    return { name, lat, lon, label, url, isVideo };
  }

  async function loadMediaFromGitHub(){
    const { owner, repo, branch, path } = MEDIA_CONFIG;
    if (!owner || !repo){
      console.info('Media: set MEDIA_CONFIG.owner/repo in the script to enable photo/video markers.');
      return [];
    }
    try {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const items = await res.json();
      if (!Array.isArray(items)) return [];
      return items
        .filter(it => it.type === 'file')
        .map(it => parseMediaFilename(it.name, it.download_url))
        .filter(Boolean)
        .sort((a,b) => a.name.localeCompare(b.name));
    } catch (err){
      console.warn('Media folder not loaded:', err.message);
      return [];
    }
  }

  function mediaIcon(isVideo){
    return L.divIcon({
      className:'',
      html:`<div class="media-marker">${isVideo ? '🎥' : '📷'}</div>`,
      iconSize:[26,26], iconAnchor:[13,13]
    });
  }

  let mediaItems = [];
  let lbIndex = 0;
  const lightboxEl = document.getElementById('lightbox');
  const lbMediaWrap = document.getElementById('lbMediaWrap');
  const lbCaption = document.getElementById('lbCaption');

  function openLightbox(idx){
    lbIndex = idx;
    renderLightbox();
    lightboxEl.classList.add('open');
  }
  function closeLightbox(){
    lightboxEl.classList.remove('open');
    lbMediaWrap.innerHTML = '';
  }
  function renderLightbox(){
    const item = mediaItems[lbIndex];
    if (!item) return;
    lbMediaWrap.innerHTML = '';
    let el;
    if (item.isVideo){
      el = document.createElement('video');
      el.controls = true;
      el.muted = true;           // required by Chrome/Edge desktop autoplay policy
      el.playsInline = true;
      el.setAttribute('webkit-playsinline', '');
      el.preload = 'metadata';

      const ext = (item.url.split('.').pop() || '').toLowerCase().split('?')[0];
      const mime = { mp4:'video/mp4', webm:'video/webm', mov:'video/quicktime' }[ext] || 'video/mp4';
      const source = document.createElement('source');
      source.src = item.url;
      source.type = mime;
      el.appendChild(source);

      el.addEventListener('error', () => {
        lbMediaWrap.innerHTML = `
          <div class="lb-error">
            Couldn't play this video in-browser.<br>
            <a href="${item.url}" target="_blank" rel="noopener">Open it directly ↗</a>
          </div>`;
      });

      lbMediaWrap.appendChild(el);
      // kick off playback explicitly; ignore rejection (user can hit play/unmute manually)
      el.play().catch(() => {});
    } else {
      el = document.createElement('img');
      el.src = item.url;
      el.alt = item.label;
      lbMediaWrap.appendChild(el);
    }
    lbCaption.innerHTML = `<div>${item.label}</div><div class="coords">${item.lat.toFixed(5)}, ${item.lon.toFixed(5)} · ${lbIndex+1} / ${mediaItems.length}</div>`;
    // fly the map to this item's location so movement is clearly visible behind the lightbox
    map.flyTo([item.lat, item.lon], Math.max(map.getZoom(), 13), { duration: 0.6 });
  }
  function lbStep(delta){
    if (!mediaItems.length) return;
    lbIndex = (lbIndex + delta + mediaItems.length) % mediaItems.length;
    renderLightbox();
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => lbStep(-1));
  document.getElementById('lbNext').addEventListener('click', () => lbStep(1));
  lightboxEl.addEventListener('click', (e) => { if (e.target === lightboxEl) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lightboxEl.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbStep(-1);
    if (e.key === 'ArrowRight') lbStep(1);
  });
  // swipe support for mobile
  let touchStartX = null;
  lbMediaWrap.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
  lbMediaWrap.addEventListener('touchend', (e) => {
    if (touchStartX == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) lbStep(dx > 0 ? -1 : 1);
    touchStartX = null;
  }, {passive:true});

  loadMediaFromGitHub().then(items => {
    mediaItems = items;
    items.forEach((item, idx) => {
      L.marker([item.lat, item.lon], { icon: mediaIcon(item.isVideo) })
        .addTo(map)
        .on('click', () => openLightbox(idx));
    });
    if (items.length){
      console.info(`Media: loaded ${items.length} photo/video marker(s).`);
    }
  });

  // ---------- Playback: replay the selected track(s) at real recorded pace ----------
  function buildPlaybackTimeline(tracks){
    stopPlayback();
    playState.segments = [];
    let offset = 0;
    let prevDay = null;
    const dayMarkers = [];
    tracks.forEach(({ t }) => {
      const dur = t.stats.duration_s || 0;
      if (dur <= 0 || !t.pts.length || t.pts[0][3] == null) return;
      if (t.day !== prevDay){
        dayMarkers.push({ offset, day: t.day });
        prevDay = t.day;
      }
      playState.segments.push({ track: t, startOffset: offset, duration: dur });
      offset += dur;
    });
    playState.totalDuration = offset;
    playState.simTime = 0;
    renderDayTicks(dayMarkers, offset);
    updatePlaybackUI();
    document.getElementById('playBtn').disabled = playState.segments.length === 0;
  }

  function renderDayTicks(dayMarkers, totalDuration){
    const wrap = document.getElementById('dayTicks');
    wrap.innerHTML = '';
    if (totalDuration <= 0 || dayMarkers.length < 2) return; // no point marking a single-day selection
    dayMarkers.forEach(m => {
      const pct = (m.offset / totalDuration) * 100;
      const tick = document.createElement('div');
      tick.className = 'day-tick';
      tick.style.left = pct + '%';
      tick.innerHTML = `<span>D${m.day.replace('day','')}</span>`;
      wrap.appendChild(tick);
    });
  }

  function getPositionAtSimTime(simTime){
    const seg = playState.segments.find(s => simTime >= s.startOffset && simTime <= s.startOffset + s.duration)
                || playState.segments[playState.segments.length - 1];
    if (!seg) return null;
    const localT = Math.min(Math.max(simTime - seg.startOffset, 0), seg.duration);
    const pts = seg.track.pts;
    let i = 0;
    while (i < pts.length - 1 && pts[i+1][3] <= localT) i++;
    const a = pts[i];
    const b = pts[Math.min(i+1, pts.length-1)];
    let frac = 0;
    if (b[3] > a[3]) frac = (localT - a[3]) / (b[3] - a[3]);
    const lat = a[0] + (b[0]-a[0])*frac;
    const lon = a[1] + (b[1]-a[1])*frac;
    const ele = a[2] + (b[2]-a[2])*frac;
    return { lat, lon, ele, type: seg.track.type, seg };
  }

  function ensurePlayMarker(type){
    const color = type === 'hiking' ? '#22c55e' : '#3355ff';
    if (!playMarker){
      playMarker = L.marker([0,0], {
        icon: L.divIcon({ className:'', html:`<div class="play-marker" style="background:${color}"></div>`, iconSize:[16,16], iconAnchor:[8,8] }),
        zIndexOffset: 1000
      }).addTo(map);
    } else {
      playMarker.setIcon(L.divIcon({ className:'', html:`<div class="play-marker" style="background:${color}"></div>`, iconSize:[16,16], iconAnchor:[8,8] }));
    }
  }

  function dayTimeAt(simTime){
    const seg = playState.segments.find(s => simTime >= s.startOffset && simTime <= s.startOffset + s.duration)
                || playState.segments[playState.segments.length - 1];
    if (!seg) return '—';
    const localT = Math.min(Math.max(simTime - seg.startOffset, 0), seg.duration);
    const startUtcMs = new Date(seg.track.stats.start_time).getTime();
    const localMs = startUtcMs + localT*1000 + 2*3600*1000; // shift to local (UTC+2)
    const d = new Date(localMs);
    const hh = String(d.getUTCHours()).padStart(2,'0');
    const mm = String(d.getUTCMinutes()).padStart(2,'0');
    const dayNum = seg.track.day.replace('day','');
    return `Day ${dayNum} · ${hh}:${mm}`;
  }

  function updatePlaybackUI(){
    const slider = document.getElementById('playSlider');
    slider.max = Math.max(1, Math.round(playState.totalDuration));
    slider.value = Math.round(playState.simTime);
    document.getElementById('playElapsed').textContent = dayTimeAt(playState.simTime);
    document.getElementById('playTotal').textContent = dayTimeAt(playState.totalDuration);
    document.getElementById('playBtn').textContent = playState.playing ? '❙❙' : '▶';
  }

  function seekTo(simTime){
    playState.simTime = Math.min(Math.max(simTime, 0), playState.totalDuration);
    const pos = getPositionAtSimTime(playState.simTime);
    if (pos){
      ensurePlayMarker(pos.type);
      playMarker.setLatLng([pos.lat, pos.lon]);
      if (!map.getBounds().contains([pos.lat, pos.lon])){
        map.panTo([pos.lat, pos.lon]);
      }
    }
    updatePlaybackUI();
  }

  function stopPlayback(){
    playState.playing = false;
    playState.lastFrameTs = null;
    updatePlaybackUI();
  }

  function playbackTick(ts){
    if (playState.playing){
      if (playState.lastFrameTs != null){
        const deltaReal = (ts - playState.lastFrameTs) / 1000;
        playState.simTime += deltaReal * playState.speed;
        if (playState.simTime >= playState.totalDuration){
          playState.simTime = playState.totalDuration;
          playState.playing = false;
        }
      }
      playState.lastFrameTs = ts;
      seekTo(playState.simTime);
    }
    requestAnimationFrame(playbackTick);
  }
  requestAnimationFrame(playbackTick);

  document.getElementById('playBtn').addEventListener('click', () => {
    if (playState.segments.length === 0) return;
    if (!playState.playing && playState.simTime >= playState.totalDuration) playState.simTime = 0;
    playState.playing = !playState.playing;
    playState.lastFrameTs = null;
    updatePlaybackUI();
  });
  document.getElementById('playSlider').addEventListener('input', (e) => {
    playState.playing = false;
    seekTo(parseFloat(e.target.value));
  });
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      playState.speed = parseFloat(btn.dataset.speed);
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  const totalDistAll = TRACKS.reduce((s,t)=>s+t.stats.distance_km,0);
  let summaryText = `${dayOrder.length} days · ${totalDistAll.toFixed(0)} km · ${TRACKS.filter(t=>t.type==='hiking').length} hikes · ${TRACKS.filter(t=>t.type!=='hiking').length} flights`;
  if (TASK && TASK.turnpoints && TASK.turnpoints.length){
    const R = 6371;
    let taskDist = 0;
    for (let i=1;i<TASK.turnpoints.length;i++){
      const a = TASK.turnpoints[i-1].waypoint, b = TASK.turnpoints[i].waypoint;
      const p1=a.lat*Math.PI/180, p2=b.lat*Math.PI/180;
      const dphi=(b.lat-a.lat)*Math.PI/180, dlmb=(b.lon-a.lon)*Math.PI/180;
      const x=Math.sin(dphi/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dlmb/2)**2;
      taskDist += 2*R*Math.asin(Math.sqrt(x));
    }
    summaryText += ` · Task route: ${taskDist.toFixed(0)} km straight-line`;
  }
  document.getElementById('tripSummary').textContent = summaryText;

  showFullRoute();

})();
</script>
</body>
</html>
